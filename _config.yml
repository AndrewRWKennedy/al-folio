# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: blank # leave blank so full name is used
first_name: Andrew
middle_name:
last_name: Kennedy
email: andrewkennedy@uchicago.edu
description: >
  PhD Student in Economics, University of Chicago.
  Applied microeconomics, experimental economics, and health economics.
keywords: economics, PhD, University of Chicago, experimental economics, applied microeconomics

lang: en
icon: # leave blank or add an emoji

url: https://andrewkennedy.github.io # UPDATE: replace with your GitHub username
baseurl:
last_updated: false

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: false
max_width: 800px

# -----------------------------------------------------------------------------
# Social integration
# -----------------------------------------------------------------------------

github_username:        # your GitHub username
twitter_username:       # your Twitter/X handle (if any)
linkedin_username:      # your LinkedIn username (if any)
scholar_userid:         # your Google Scholar ID — find it in your Scholar profile URL
orcid_id:               # your ORCID iD (if any)
ssrn_id:                # your SSRN author ID (if any)

contact_note: >
  I am always happy to discuss my research.

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/

announcements:
  enabled: false
  scrollable: true
  limit: 5

latest_posts:
  enabled: false
  scrollable: true
  limit: 3

# -----------------------------------------------------------------------------
# Jekyll Scholar
# -----------------------------------------------------------------------------

scholar:
  last_name: [Kennedy]
  first_name: [Andrew]

  style: apa
  locale: en

  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  bibtex_filters: [latex, smallcaps, superscript]

  replace_strings: true
  join_strings: true

  details_dir: bibliography
  details_link: Details

  query: "@*"
  group_by: none
  group_order: descending

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_separator: ~~~

include: ['_pages']
exclude:
  - bin/
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - Dockerfile
  - docker-compose.yml
  - FAQ.md
  - Makefile
  - README.md
  - robots.txt
  - vendor

keep_files:
  - CNAME
  - .nojekyll
  - .git

plugins:
  - jekyll-archives
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-scholar
  - jekyll-sitemap
  - jekyll-toc
  - jemoji

# -----------------------------------------------------------------------------
# Analytics
# -----------------------------------------------------------------------------

google_analytics:  # add your GA measurement ID if desired (format: G-XXXXXXXXXX)
